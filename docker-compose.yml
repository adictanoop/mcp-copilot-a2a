
services:
  app:
    build: .
    container_name: ci-pipeline-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - pipeline_net
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: ci-pipeline-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pipeline_net
    restart: unless-stopped

volumes:
  chroma_data:

networks:
  pipeline_net:
    driver: bridge
